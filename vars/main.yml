---
__microsoft_repository_gpgkey_keyring: '/usr/share/keyrings/microsoft-archive-keyring.gpg'

__microsoft_repository_prod_repository_dict:
  Debian: "{{ microsoft_repository_mirror_url }}/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_major_version'] }}/prod {{ ansible_facts['distribution_release'] }} main"
  RedHat: "{{ microsoft_repository_mirror_url }}/rhel/{{ ansible_facts['distribution_major_version'] }}/prod"
  Ubuntu: "{{ microsoft_repository_mirror_url }}/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_version'] }}/prod {{ ansible_facts['distribution_release'] }} main"

__microsoft_repository_prod_repository: "{{ __microsoft_repository_prod_repository_dict[ansible_facts['distribution']] | default(__microsoft_repository_prod_repository_dict[ansible_facts['os_family']]) }}"
